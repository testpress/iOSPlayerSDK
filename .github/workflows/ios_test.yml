name: iOS Test

on: [push, pull_request]

jobs:
  build:

    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Xcode
      uses: actions/setup-xcode@v2
      with:
        xcode-version: '12.5' # Change to the desired Xcode version

    - name: Install dependencies
      run: |
        xcodebuild -resolvePackageDependencies
        xcodebuild -list

    - name: Build and test
      run: xcodebuild test -scheme YourScheme -destination "platform=iOS Simulator,OS=15.0,name=iPhone 13"